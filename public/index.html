<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="build-time" content="__BUILD_TIME__" />
  <title>SVG → HTML</title>
  <link rel="stylesheet" href="/transformer/index.css" />
</head>
<body>
  <div class="app-shell sidebar-collapsed" id="appShell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m10 13-2 2 2 2"/><path d="m14 17 2-2-2-2"/></svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">SVG → HTML</span>
          <span class="brand-version" id="runtimeInfo"></span>
        </div>
      </div>

      <div class="upload-zone" id="uploadZone">
        <input type="file" accept=".svg" id="fileInput" style="display:none" />
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span id="uploadLabel">上传 SVG</span>
      </div>

      <div class="session-list" id="sessionList"></div>
    </aside>

    <main class="main-panel">
      <header class="toolbar">
        <div class="toolbar-leading">
          <button class="icon-btn" id="sidebarToggleBtn" type="button" title="展开 Session">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="4" y1="6" x2="20" y2="6"></line>
              <line x1="4" y1="12" x2="20" y2="12"></line>
              <line x1="4" y1="18" x2="20" y2="18"></line>
            </svg>
          </button>
          <div class="toolbar-left">
            <h2 class="toolbar-title" id="sessionTitle">选择一个 session</h2>
            <p class="toolbar-meta" id="sessionMeta">上传 SVG 开始</p>
          </div>
        </div>
        <div class="toolbar-actions">
          <span class="execution-badge" id="executionBadge"></span>
          <button class="link-btn toolbar-link-btn" id="chatToggleBtn" type="button" disabled>打开聊天</button>
          <a class="link-btn toolbar-link-btn download-btn" id="downloadBtn" style="display:none" href="#">下载 Session</a>
          <button class="icon-btn" id="pauseBtn" disabled title="暂停">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
          </button>
          <button class="icon-btn icon-btn-accent" id="resumeBtn" disabled title="继续">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
          <button class="icon-btn icon-btn-danger" id="deleteSessionBtn" disabled title="删除 Session">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
              <line x1="6" y1="6" x2="18" y2="18"></line>
              <line x1="18" y1="6" x2="6" y2="18"></line>
            </svg>
          </button>
          <button class="icon-btn" id="themeToggleBtn" type="button" title="切换主题">
            <svg class="theme-icon-dark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <svg class="theme-icon-light" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </button>
        </div>
      </header>

      <div class="content-area">
        <section class="workflow-panel visible" id="workflowPanel">
          <div class="workflow-stage-card">
            <div class="workflow-summary">
              <span class="workflow-kicker">Workflow</span>
              <div class="workflow-summary-main">
                <strong class="workflow-current" id="workflowCurrent">等待开始</strong>
              </div>
              <p class="workflow-detail" id="workflowDetail">上传 SVG 后会显示实时进度</p>
              <div class="workflow-warning" id="workflowModuleWarning" hidden></div>
            </div>
            <div class="workflow-nodes" id="workflowNodes"></div>
            <div class="workflow-stage-tip" id="workflowStageTip">首轮生成结束后，这里会切换成完整对比结果。</div>
          </div>
        </section>

        <section class="result-panel" id="resultPanel">
          <div class="result-panel-header">
            <div class="result-panel-heading">
              <span class="result-panel-title">对比结果</span>
              <span class="result-diff-gap" id="resultDiffGap" hidden></span>
              <span class="result-token-badge" id="resultTokenBadge" hidden></span>
            </div>
            <div class="result-panel-controls">
              <span class="result-cache-status" id="resultCacheStatus" hidden></span>
              <label class="result-size-control" for="previewSizeRange">
                <span>预览宽度</span>
                <input id="previewSizeRange" type="range" min="375" max="1920" step="5" value="375" />
                <span class="result-size-value" id="previewSizeValue">375px</span>
              </label>
            </div>
          </div>
          <div class="result-grid" id="resultGrid"></div>
          <div class="result-urls" id="resultUrls"></div>
          <div class="result-actions" id="resultActions"></div>
        </section>
      </div>
    </main>
  </div>

  <section class="chat-drawer" id="chatDrawer">
    <div class="chat-drawer-header">
      <div class="chat-drawer-heading">
        <strong class="chat-drawer-title">聊天调整</strong>
        <span class="chat-drawer-meta" id="chatStatus">选择 session 后可查看聊天</span>
      </div>
      <button class="icon-btn" id="chatCloseBtn" type="button" title="关闭聊天">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="module-picker" id="modulePicker">
      <div class="module-picker-header">
        <span>选择模块</span>
        <strong id="selectedModuleLabel">未选择</strong>
      </div>
      <div class="module-picker-list" id="modulePickerList"></div>
    </div>
    <div class="conversation-stream" id="messageList">
      <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span>点击顶部按钮后可查看聊天</span>
      </div>
    </div>
    <form class="composer" id="composer">
      <textarea id="messageInput" rows="1" placeholder="输入调整要求…"></textarea>
      <div class="composer-footer">
        <span class="composer-hint" id="composerHint">发送需点击按钮，Enter 不会提交</span>
        <button class="send-btn" type="submit" id="sendBtn" disabled>发送</button>
      </div>
    </form>
  </section>

  <dialog class="upload-dialog" id="uploadDialog">
    <div class="upload-dialog-content">
      <h3 class="upload-dialog-title">上传设计稿</h3>
      <div class="upload-dialog-field">
        <label class="upload-dialog-label" for="uploadScaleSelect">HTML 产出倍率</label>
        <select class="upload-dialog-select" id="uploadScaleSelect">
          <option value="1">1x — 按设计稿原始像素产出 HTML</option>
          <option value="2">2x — 按设计稿 2x 像素产出 HTML</option>
        </select>
      </div>
      <div class="upload-dialog-field">
        <span class="upload-dialog-label">输出格式</span>
        <div class="upload-format-options">
          <label class="upload-format-option">
            <input type="checkbox" value="html" checked disabled />
            <span>HTML</span>
          </label>
          <label class="upload-format-option">
            <input type="checkbox" value="react" id="uploadFormatReact" />
            <span>React</span>
          </label>
          <label class="upload-format-option">
            <input type="checkbox" value="vue" id="uploadFormatVue" />
            <span>Vue</span>
          </label>
        </div>
      </div>
      <div class="upload-dialog-field">
        <label class="upload-dialog-label">选择文件</label>
        <label class="upload-dialog-file" id="uploadDialogFileZone">
          <input type="file" accept=".svg" id="uploadDialogFileInput" />
          <span id="uploadDialogFileName">点击选择 SVG 文件</span>
        </label>
      </div>
      <div class="upload-dialog-actions">
        <button class="upload-dialog-cancel" id="uploadDialogCancel" type="button">取消</button>
        <button class="upload-dialog-submit" id="uploadDialogSubmit" type="button" disabled>上传</button>
      </div>
    </div>
  </dialog>

  <script src="/transformer/index.js"></script>
</body>
</html>
